<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Alex Merced</title>
  <meta name="description" content="This page doesn't exist. Head back to alexmerced.com to explore.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/index.css">
  <style>
    .error-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); text-align: center; padding: 2rem;
    }
    .error-page__code {
      font-size: clamp(5rem, 15vw, 10rem); font-weight: 300;
      letter-spacing: var(--tracking-display);
      color: var(--text); line-height: 1; opacity: 0.1;
    }
    .error-page__title {
      font-size: var(--text-heading); color: var(--text);
      letter-spacing: var(--tracking-heading); margin: -1rem 0 1rem;
    }
    .error-page__text {
      color: var(--text-muted); font-size: var(--text-body);
      letter-spacing: var(--tracking-body);
      margin-bottom: 2.5rem; max-width: 480px; margin-left: auto; margin-right: auto;
    }
    .error-page__img {
      width: 200px; height: 200px;
      object-fit: cover; margin: 0 auto 2rem; display: block;
      border: 1px solid var(--border-light);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
  </style>
</head>
<body>
  <nav class="nav" aria-label="Main navigation">
    <div class="container nav__inner">
      <a href="/" class="nav__logo"><span class="nav__logo-icon">AM</span><span>Alex Merced</span></a>
      <div class="nav__links" id="nav-links">
        <a href="/">Home</a>
        <a href="/professional.html">Professional</a>
        <a href="/personal.html">Personal</a>
        <a href="https://alexmerced.blog" target="_blank" rel="noopener">Blog</a>
        <a href="https://buymeacoffee.com/alexmerced" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
      </div>
      <div class="nav__actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <button class="nav__hamburger" id="nav-hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <main class="error-page">
    <div>
      <img src="/alexpics/cartoon-laptop-on-iceberg.jpg" alt="Alex Merced on an iceberg" class="error-page__img">
      <div class="error-page__code">404</div>
      <h1 class="error-page__title">Page Not Found</h1>
      <p class="error-page__text">Looks like this page drifted off the iceberg. Let's get you back to solid ground.</p>
      <a href="/" class="btn">← Back to Home</a>
    </div>
  </main>

  <script type="module" src="/main.js"></script>
</body>
</html>
